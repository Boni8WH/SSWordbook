{% extends "base.html" %}
{% block title %}みんなの苦手問題レポート - {{ app_name }}{% endblock %}

{% block content %}
<style>
    .report-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }

    .report-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .controls-panel {
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 30px;
    }

    .rooms-selector {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 15px;
    }

    .limit-selector {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
    }

    .limit-selector select {
        width: auto;
    }

    .section-title {
        border-bottom: 2px solid #343a40;
        padding-bottom: 5px;
        margin-top: 40px;
        margin-bottom: 15px;
    }

    .table th {
        background-color: #e9ecef;
    }

    /* Print styles */
    @media print {
        body {
            background-color: #fff;
        }

        .controls-panel, .report-header .btn, nav.navbar, footer.footer, .print-hide {
            display: none !important;
        }

        .report-container {
            padding: 0;
            max-width: 100%;
        }

        .page-break {
            page-break-before: always;
        }

        .table th, .table td {
            padding: 0.4rem;
            font-size: 11pt;
        }

        .section-title {
            margin-top: 20px;
        }

        @page {
            size: A4;
            margin: 15mm;
        }
    }
</style>

<div class="report-container">
    <div class="report-header">
        <h2><i class="fas fa-chart-pie me-2"></i>みんなの苦手問題レポート</h2>
        <div>
            <a href="{{ url_for('admin_page') }}" class="btn btn-outline-secondary me-2 print-hide">
                <i class="fas fa-arrow-left me-1"></i>戻る
            </a>
            <button class="btn btn-primary print-hide" onclick="window.print()">
                <i class="fas fa-print me-1"></i>PDFで保存
            </button>
        </div>
    </div>

    <div class="controls-panel">
        <h5><i class="fas fa-filter me-2"></i>レポート設定</h5>
        
        <label class="form-label fw-bold mt-2">対象の部屋を選択:</label>
        <div class="rooms-selector">
            {% for room in available_rooms %}
            <div class="form-check">
                <input class="form-check-input room-checkbox" type="checkbox" value="{{ room }}" id="room_{{ room }}" checked>
                <label class="form-check-label" for="room_{{ room }}">
                    {{ room }}
                </label>
            </div>
            {% endfor %}
            <div class="form-check">
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="selectAllRooms(true)">全選択</button>
                <button type="button" class="btn btn-sm btn-outline-secondary ms-1" onclick="selectAllRooms(false)">全解除</button>
            </div>
        </div>

        <div class="limit-selector">
            <label class="form-label fw-bold mb-0">表示する問題数（最大）:</label>
            <select class="form-select" id="problemLimit">
                <option value="10">10問</option>
                <option value="20" selected>20問</option>
                <option value="30">30問</option>
                <option value="50">50問</option>
            </select>
            <span class="text-muted small">※印刷時のレイアウトを考慮して設定してください。</span>
        </div>

        <button class="btn btn-success" onclick="generateReport()" id="generateBtn">
            <i class="fas fa-sync-alt me-1"></i>レポートを作成
        </button>
    </div>

    <div id="loadingIndicator" class="text-center my-5" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2 text-muted">集計中...</p>
    </div>

    <div id="reportContent">
        <!-- Report will be rendered here -->
    </div>
</div>

<script>
    function selectAllRooms(select) {
        document.querySelectorAll('.room-checkbox').forEach(cb => {
            cb.checked = select;
        });
    }

    async function generateReport() {
        const checkboxes = document.querySelectorAll('.room-checkbox:checked');
        const selectedRooms = Array.from(checkboxes).map(cb => cb.value);
        const limit = document.getElementById('problemLimit').value;

        if (selectedRooms.length === 0) {
            alert('対象の部屋を1つ以上選択してください。');
            return;
        }

        const btn = document.getElementById('generateBtn');
        const loading = document.getElementById('loadingIndicator');
        const content = document.getElementById('reportContent');

        btn.disabled = true;
        loading.style.display = 'block';
        content.innerHTML = '';

        try {
            const response = await fetch("{{ url_for('api_admin_weak_problems_aggregated') }}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    rooms: selectedRooms,
                    limit: parseInt(limit)
                })
            });

            const data = await response.json();

            if (data.status === 'success') {
                renderReport(data.aggregated_data, data.room_data, selectedRooms);
            } else {
                alert('エラーが発生しました: ' + data.message);
            }
        } catch (error) {
            console.error('Error fetching report:', error);
            alert('レポートの取得中にエラーが発生しました。');
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    function renderReport(aggregatedData, roomData, selectedRooms) {
        const content = document.getElementById('reportContent');
        let html = '';

        // Aggregated Section
        html += `
            <div class="report-section">
                <h3 class="section-title">
                    <i class="fas fa-users me-2"></i>全選択部屋 合算 (${selectedRooms.join(', ')})
                </h3>
                ${renderTable(aggregatedData)}
            </div>
        `;

        // Room Sections
        for (const room of selectedRooms) {
            const rData = roomData[room] || [];
            if (rData.length > 0) {
                html += `
                    <div class="report-section page-break">
                        <h3 class="section-title">
                            <i class="fas fa-door-open me-2"></i>部屋: ${room}
                        </h3>
                        ${renderTable(rData)}
                    </div>
                `;
            } else {
                html += `
                    <div class="report-section page-break">
                        <h3 class="section-title">
                            <i class="fas fa-door-open me-2"></i>部屋: ${room}
                        </h3>
                        <p class="text-muted">苦手問題のデータがありません。</p>
                    </div>
                `;
            }
        }

        content.innerHTML = html;
    }

    function renderTable(problems) {
        if (!problems || problems.length === 0) {
            return '<p class="text-muted">該当するデータがありません。</p>';
        }

        let rows = problems.map((p, index) => `
            <tr>
                <td class="text-center">${index + 1}</td>
                <td>${escapeHtml(p.question)}</td>
                <td><strong>${escapeHtml(p.answer)}</strong></td>
                <td class="text-center">${p.accuracyRate.toFixed(1)}%</td>
                <td class="text-center">${p.correctAttempts} / ${p.totalAttempts}</td>
            </tr>
        `).join('');

        return `
            <div class="table-responsive">
                <table class="table table-bordered table-sm table-striped">
                    <thead>
                        <tr>
                            <th style="width: 50px;" class="text-center">順位</th>
                            <th>問題</th>
                            <th>解答</th>
                            <th style="width: 100px;" class="text-center">正答率</th>
                            <th style="width: 120px;" class="text-center">正解 / 回答数</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            </div>
        `;
    }

    function escapeHtml(unsafe) {
        return (unsafe || '').toString()
             .replace(/&/g, "&amp;")
             .replace(/</g, "&lt;")
             .replace(/>/g, "&gt;")
             .replace(/"/g, "&quot;")
             .replace(/'/g, "&#039;");
    }

    // Auto-generate on load
    document.addEventListener('DOMContentLoaded', () => {
        if(document.querySelectorAll('.room-checkbox').length > 0) {
            generateReport();
        }
    });
</script>
{% endblock %}
