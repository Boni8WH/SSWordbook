<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界史地図学習ツール</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        #map {
            height: 80vh;
            width: 100%;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .map-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .map-controls {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="container map-container">
        <header class="text-center mb-4">
            <h1>世界史地図学習ツール</h1>
            <a href="/" class="btn btn-secondary">ホームに戻る</a>
        </header>

        <div class="map-controls">
            <!-- Future controls for layers or search will go here -->
            <p>地名をクリックすると詳細が表示されます。{% if is_admin %}<span class="badge bg-danger">管理者モード: 編集可能</span>{% endif %}</p>
        </div>

        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet Draw JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
        window.isAdmin = {{ 'true' if is_admin else 'false' }};
    </script>
    <script src="{{ url_for('static', filename='map.js') }}"></script>
</body>

</html>
