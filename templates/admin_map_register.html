{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<style>
    .map-container {
        display: flex;
        height: 80vh;
    }

    .sidebar {
        width: 300px;
        overflow-y: auto;
        padding: 10px;
        border-right: 1px solid #ccc;
        background: #f8f9fa;
    }

    .map-view {
        flex: 1;
        position: relative;
    }

    #map {
        height: 100%;
        width: 100%;
    }

    .location-item {
        padding: 8px;
        margin-bottom: 5px;
        background: white;
        border: 1px solid #ddd;
        cursor: pointer;
        border-radius: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .location-item:hover {
        background: #e9ecef;
    }

    .location-item.active {
        background: #007bff;
        color: white;
    }

    .status-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: #dc3545;
        /* Red = Not set */
    }

    .status-indicator.set {
        background-color: #28a745;
        /* Green = Set */
    }
</style>

<div class="container-fluid mt-4">
    <h2>Map Coordinate Registration</h2>
    <div class="row">
        <div class="col-12">
            <div class="map-container">
                <div class="sidebar">
                    {% for area, locs in locations.items() %}
                    <h5 class="mt-2">{{ area }}</h5>
                    {% for loc in locs %}
                    <div class="location-item" onclick="selectLocation({{ loc | tojson }})" id="loc-{{ loc.id }}">
                        <span>{{ loc.name }} (Type: {{ loc.type }})</span>
                        <span class="status-indicator {% if loc.lat %}set{% endif %}"></span>
                    </div>
                    {% endfor %}
                    {% endfor %}
                </div>
                <div class="map-view">
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize Map
    // Using EPSG3857 (Default) but overlaying image
    var map = L.map('map', {
        crs: L.CRS.EPSG3857,
        minZoom: 1,
        maxZoom: 6,
        center: [0, 0],
        zoom: 2
    });

    // Image Bounds - Approximated for a standard world map image
    // Adjust these if the map projection is different
    var bounds = [[-85, -180], [85, 180]];
    var image = L.imageOverlay('/static/images/world_map.png', bounds).addTo(map);
    map.fitBounds(bounds);

    var currentMarker = null;
    var currentLocation = null;

    function selectLocation(loc) {
        currentLocation = loc;

        // Highlight sidebar item
        document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
        document.getElementById('loc-' + loc.id).classList.add('active');

        // Remove existing marker
        if (currentMarker) {
            map.removeLayer(currentMarker);
            currentMarker = null;
        }

        var lat = loc.lat;
        var lng = loc.lng;

        if (lat === null || lat === undefined) {
            // Default center if not set
            lat = map.getCenter().lat;
            lng = map.getCenter().lng;
        }

        // Add draggable marker
        currentMarker = L.marker([lat, lng], {
            draggable: true
        }).addTo(map);

        currentMarker.bindPopup("<b>" + loc.name + "</b><br>Drag to correct position.").openPopup();

        // Pan to marker
        map.setView([lat, lng], map.getZoom());

        // Save on dragend
        currentMarker.on('dragend', function (event) {
            var marker = event.target;
            var position = marker.getLatLng();
            saveCoordinate(loc.id, position.lat, position.lng, map.getZoom());
        });
    }

    function saveCoordinate(id, lat, lng, zoom) {
        fetch('/admin/map/update_coords', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                id: id,
                lat: lat,
                lng: lng,
                zoom: zoom
            })
        })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    console.log('Saved');
                    // Update sidebar indicator
                    document.querySelector('#loc-' + id + ' .status-indicator').classList.add('set');
                    // Update local object
                    currentLocation.lat = lat;
                    currentLocation.lng = lng;
                } else {
                    alert('Error saving');
                }
            });
    }

    // Allow clicking on map to place marker if active location has no coords
    map.on('click', function (e) {
        if (currentLocation && !currentMarker) {
            currentMarker = L.marker(e.latlng, {
                draggable: true
            }).addTo(map);

            saveCoordinate(currentLocation.id, e.latlng.lat, e.latlng.lng, map.getZoom());

            currentMarker.on('dragend', function (event) {
                var marker = event.target;
                var position = marker.getLatLng();
                saveCoordinate(currentLocation.id, position.lat, position.lng, map.getZoom());
            });
        } else if (currentLocation && currentMarker) {
            // Move marker to click position
            currentMarker.setLatLng(e.latlng);
            saveCoordinate(currentLocation.id, e.latlng.lat, e.latlng.lng, map.getZoom());
        }
    });

</script>
{% endblock %}
