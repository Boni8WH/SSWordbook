{% extends "base.html" %}
{% block title %}カスタム順編集 - {{ app_name }}{% endblock %}

{% block head_extra %}
<link
    href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700&family=Kaisei+Tokumin:wght@400;700&display=swap"
    rel="stylesheet">
<!-- SortableJS -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>
    .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        gap: 12px;
        flex-wrap: wrap;
    }

    .page-title {
        font-family: 'Shippori Mincho', serif;
        font-size: clamp(1.2rem, 4vw, 1.8rem);
        font-weight: 700;
        color: #1a1a2e;
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
    }

    .page-header-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
    }

    .chapter-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        border: 1px solid #e2e8f0;
        overflow: hidden;
    }

    /* 章タイトル行 */
    .chapter-title {
        font-size: 1.15rem;
        font-weight: bold;
        color: #2d3748;
        padding: 14px 18px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        background: #f8fafc;
        border-bottom: 2px solid #edf2f7;
        user-select: none;
        transition: background 0.15s;
        min-width: 0;
    }

    .chapter-title:hover {
        background: #edf2f7;
    }

    .chapter-title-text {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .chapter-title-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }

    .chapter-badge {
        font-size: 0.75rem;
        color: #718096;
        white-space: nowrap;
    }

    .toggle-icon {
        font-size: 0.9rem;
        color: #a0aec0;
        transition: transform 0.25s;
        display: inline-block;
    }

    .chapter-card.collapsed .toggle-icon {
        transform: rotate(-90deg);
    }

    .chapter-content {
        padding: 16px;
        display: block;
    }

    .chapter-card.collapsed .chapter-content {
        display: none;
    }

    /* 単元グループ */
    .unit-group {
        margin-bottom: 16px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        background: #f8fafc;
        overflow: hidden;
    }

    /* 単元ヘッダー行 */
    .unit-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        cursor: pointer;
        background: #f0f4f8;
        border-bottom: 1px solid #e2e8f0;
        user-select: none;
        transition: background 0.15s;
        min-width: 0;
    }

    .unit-header:hover {
        background: #e2e8f0;
    }

    .unit-header-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        flex: 1;
    }

    .unit-toggle-icon {
        font-size: 0.8rem;
        color: #a0aec0;
        transition: transform 0.25s;
        display: inline-block;
        flex-shrink: 0;
    }

    .unit-group.unit-collapsed .unit-toggle-icon {
        transform: rotate(-90deg);
    }

    .unit-name-text {
        font-size: 0.95rem;
        font-weight: 700;
        color: #4a5568;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
    }

    .unit-badge {
        font-size: 0.72rem;
        background: #e2e8f0;
        color: #718096;
        padding: 2px 8px;
        border-radius: 10px;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .unit-collapse-hint {
        font-size: 0.75rem;
        color: #a0aec0;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .unit-content {
        padding: 12px;
        display: block;
    }

    .unit-group.unit-collapsed .unit-content {
        display: none;
    }

    .word-list {
        list-style: none;
        padding: 0;
        margin: 0;
        min-height: 50px;
    }

    .word-item {
        display: flex;
        align-items: center;
        padding: 10px 12px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        margin-bottom: 8px;
        cursor: grab;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        gap: 10px;
        min-width: 0;
    }

    .word-item:active {
        cursor: grabbing;
    }

    .word-item.sortable-ghost {
        opacity: 0.4;
        background: #e2e8f0;
    }

    .drag-handle {
        color: #a0aec0;
        cursor: grab;
        font-size: 1.1rem;
        flex-shrink: 0;
    }

    .word-info {
        flex: 1;
        min-width: 0;
    }

    .word-question {
        font-weight: 600;
        color: #2d3748;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .word-answer {
        font-size: 0.85rem;
        color: #718096;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .save-btn {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        padding: 9px 18px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 0.9rem;
        box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        transition: all 0.2s;
        white-space: nowrap;
    }

    .save-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        color: white;
    }

    .floating-save-area {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
    }

    /* レスポンシブ調整 */
    @media (max-width: 576px) {

        .word-question,
        .word-answer {
            font-size: 0.85rem;
        }

        .chapter-title {
            font-size: 1rem;
            padding: 12px 14px;
        }

        .unit-header {
            padding: 9px 12px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4 mb-5 pb-5">
    <div class="page-header">
        <h1 class="page-title"><i class="fas fa-list-ol"></i> カスタム順の編集</h1>
        <div class="page-header-actions">
            <button class="save-btn" onclick="saveCustomOrder()">
                <i class="fas fa-save"></i> 変更を保存
            </button>
        </div>
    </div>

    <div class="alert alert-info">
        <i class="fas fa-info-circle"></i> 各単元内の問題をドラッグ＆ドロップで好きな順番に入れ替えることができます。（※Z問題は並び替え対象外です）
    </div>

    <div id="loadingIndicator" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">読み込み中...</span>
        </div>
        <p class="mt-2 text-muted">データを読み込んでいます...</p>
    </div>

    <div id="editorContainer" style="display: none;"></div>
</div>

<div class="floating-save-area" style="display: none;" id="floatingSave">
    <button class="save-btn btn-lg" onclick="saveCustomOrder()">
        <i class="fas fa-save"></i> 変更を保存
    </button>
</div>

<script>
    let globalCustomOrder = {};

    function generateProblemId(word) {
        try {
            const chapter = String(word.chapter || '0').padStart(3, '0');
            const number = String(word.number || '0').padStart(3, '0');
            const question = String(word.question || '');
            const answer = String(word.answer || '');
            const questionClean = question.substring(0, 15).replace(/[^a-zA-Z0-9\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/g, '');
            const answerClean = answer.substring(0, 10).replace(/[^a-zA-Z0-9\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/g, '');
            return `${chapter}-${number}-${questionClean}-${answerClean}`;
        } catch (error) {
            return `error-id-${Math.random()}`;
        }
    }

    function toggleChapter(titleElement) {
        const card = titleElement.closest('.chapter-card');
        card.classList.toggle('collapsed');
    }

    function toggleUnit(headerElement) {
        const group = headerElement.closest('.unit-group');
        group.classList.toggle('unit-collapsed');
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const loadingIndicator = document.getElementById('loadingIndicator');
        const container = document.getElementById('editorContainer');
        const floatingSave = document.getElementById('floatingSave');

        try {
            const [wordRes, progressRes] = await Promise.all([
                fetch('/api/word_data'),
                fetch('/api/load_quiz_progress')
            ]);

            let words = await wordRes.json();
            const progress = await progressRes.json();

            if (progress.status === 'success') {
                globalCustomOrder = progress.customOrder || {};
            }

            // Z問題を除外
            words = words.filter(w => w.number !== 'Z');

            // グループ化
            const grouped = {};
            words.forEach(word => {
                const ch = word.chapter === 'S' ? '歴史総合' : `第${word.chapter}章`;
                const catName = word.category || '未分類';
                if (!grouped[ch]) grouped[ch] = {};
                if (!grouped[ch][catName]) grouped[ch][catName] = [];
                grouped[ch][catName].push(word);
            });

            let html = '';
            for (const [chName, units] of Object.entries(grouped)) {
                const totalWords = Object.values(units).reduce((sum, arr) => sum + arr.length, 0);
                html += `<div class="chapter-card collapsed">
                    <div class="chapter-title" onclick="toggleChapter(this)">
                        <span class="chapter-title-text">${chName}</span>
                        <div class="chapter-title-right">
                            <span class="chapter-badge">${Object.keys(units).length}単元・${totalWords}問</span>
                            <span class="toggle-icon">▼</span>
                        </div>
                    </div>
                    <div class="chapter-content">`;

                for (const [unitName, items] of Object.entries(units)) {
                    const unitId = `unit-${Math.random().toString(36).substr(2, 9)}`;
                    html += `
                        <div class="unit-group unit-collapsed">
                            <div class="unit-header" onclick="toggleUnit(this)">
                                <div class="unit-header-left">
                                    <span class="unit-toggle-icon">▼</span>
                                    <span class="unit-name-text">${unitName}</span>
                                    <span class="unit-badge">${items.length}問</span>
                                </div>
                                <span class="unit-collapse-hint">タップで展開</span>
                            </div>
                            <div class="unit-content">
                                <ul class="word-list" id="${unitId}">`;

                    // カスタム順が保存されていればその順序にソート
                    let sortedItems = [...items];
                    sortedItems.sort((a, b) => {
                        const idA = generateProblemId(a);
                        const idB = generateProblemId(b);
                        const orderA = globalCustomOrder[idA] !== undefined ? globalCustomOrder[idA] : 999999;
                        const orderB = globalCustomOrder[idB] !== undefined ? globalCustomOrder[idB] : 999999;
                        return orderA - orderB;
                    });

                    sortedItems.forEach(item => {
                        const wid = generateProblemId(item);
                        html += `
                            <li class="word-item" data-id="${wid}">
                                <i class="fas fa-grip-vertical drag-handle"></i>
                                <div class="word-info">
                                    <div class="word-question">${item.question}</div>
                                    <div class="word-answer">${item.answer}</div>
                                </div>
                            </li>`;
                    });
                    html += `</ul></div></div>`;
                }
                html += `</div></div>`;
            }
            container.innerHTML = html;

            // SortableJSの初期化
            document.querySelectorAll('.word-list').forEach(el => {
                new Sortable(el, {
                    animation: 150,
                    handle: '.word-item',
                    ghostClass: 'sortable-ghost',
                    onEnd: function () {
                        floatingSave.style.display = 'block';
                    }
                });
            });

            loadingIndicator.style.display = 'none';
            container.style.display = 'block';

            // スクロール時にフローティング保存ボタンを表示
            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    floatingSave.style.display = 'block';
                } else {
                    floatingSave.style.display = 'none';
                }
            });

        } catch (error) {
            console.error(error);
            loadingIndicator.innerHTML = `<p class="text-danger"><i class="fas fa-exclamation-triangle"></i> 読み込みに失敗しました。</p>`;
        }
    });

    async function saveCustomOrder() {
        const newOrder = {};
        let globalIndex = 0;

        // すべての単元のリストを走査し、出現順にインデックスを振る
        document.querySelectorAll('.word-list').forEach(ul => {
            ul.querySelectorAll('.word-item').forEach(li => {
                const wid = li.getAttribute('data-id');
                if (wid) {
                    newOrder[wid] = globalIndex++;
                }
            });
        });

        try {
            const res = await fetch('/api/save_custom_order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ customOrder: newOrder })
            });
            const data = await res.json();
            if (data.status === 'success') {
                alert('カスタム順を保存しました！\n一問一答モードで「カスタム順」を選んでください。');
                document.getElementById('floatingSave').style.display = 'none';
            } else {
                alert('エラーが発生しました: ' + data.message);
            }
        } catch (error) {
            console.error(error);
            alert('保存に失敗しました。');
        }
    }
</script>
{% endblock %}
