{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="card-title mb-0">世界史地図問題集</h3>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('map_quiz') }}" method="get">
                        <div class="mb-3">
                            <label for="area" class="form-label">地域 (Area)</label>
                            <select class="form-select" id="area" name="area">
                                <option value="All">全世界 (All Areas)</option>
                                {% for area in areas %}
                                <option value="{{ area }}">{{ area }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="era" class="form-label">時代 (Era)</label>
                            <select class="form-select" id="era" name="era">
                                <option value="All">全時代 (All Eras)</option>
                                {% for era in eras %}
                                <option value="{{ era }}">{{ era }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">学習を開始する (Start Learning)</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
